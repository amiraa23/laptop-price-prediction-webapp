    <script>
        async function makePrediction() {
            const formData = {
                Company: document.getElementById("Company").value,
                TypeName: document.getElementById("TypeName").value,
                Inches: parseFloat(document.getElementById("Inches").value),
                ScreenResolution: document.getElementById("ScreenResolution").value,
                Cpu: document.getElementById("Cpu").value,
                Ram: parseInt(document.getElementById("Ram").value),
                Memory: document.getElementById("Memory").value,
                Gpu: document.getElementById("Gpu").value,
                OpSys: document.getElementById("OpSys").value,
                Weight: parseFloat(document.getElementById("Weight").value)
            };

            const loadingIndicator = document.getElementById("loading");
            loadingIndicator.style.display = "block";

            const response = await fetch("http://127.0.0.1:8000/predict/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(formData)
            });

            loadingIndicator.style.display = "none";
            const data = await response.json();
            const output = document.getElementById("prediction-result");
            if (response.ok) {
                output.innerHTML = `<span style="color: #1e90ff;">Predicted Price: </span> ${data.predictions[0].toFixed(2)}`;
            } else {
                output.innerHTML = `<span style="color: red;">Error:</span> ${data.detail}`;
            }
        }

        document.getElementById("prediction-form").addEventListener("submit", function(event) {
            event.preventDefault();
            makePrediction();
        });
    </script>
